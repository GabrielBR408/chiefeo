  Three descending bars represent an auto-prioritized task list:
  the most important item is bold and full-width at the top,
  with each subsequent task ranked lower and shorter.
  © 2026 GREVE LLC
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>
  <g>
    <rect x="222" y="280" width="580" height="130" rx="65" ry="65" fill="#ffffff"/>
    <rect x="222" y="447" width="440" height="130" rx="65" ry="65" fill="#ffffff" opacity="0.78"/>
    <rect x="222" y="614" width="300" height="130" rx="65" ry="65" fill="#ffffff" opacity="0.58"/>
  </g>
</svg>
